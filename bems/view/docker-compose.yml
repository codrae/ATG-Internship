version: '3.8'

services:
  bems-frontend:
    container_name: bems-frontend-prod
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:

      - NODE_ENV=production

      - NEXT_PUBLIC_SERVER_URL=${NEXT_PUBLIC_SERVER_URL}
      - SPRING_URL=${SPRING_URL}
    volumes:
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  app-network:
    external: true
    name: bems-network
